syntax = "proto3";

package video;


service VideoService {

    rpc GetVideo (VideoRequest)
        returns (VideoResponse);

    rpc ListVideos (Empty)
        returns (VideoList);

    rpc CreateVideo (CreateVideoRequest)
        returns (VideoResponse);

    rpc SearchVideos (SearchRequest)
        returns (VideoList);

    rpc DeleteVideo (VideoRequest)
        returns (DeleteResponse);

    rpc GetTrendingVideos (Empty)
        returns (VideoList);

    rpc GetLatestVideos (Empty)
        returns (VideoList);
}


message Empty {}

message VideoRequest {
    int32 id = 1;
}

message SearchRequest {
    string query = 1;
}

message CreateVideoRequest {
    string title = 1;
    string description = 2;
    string category = 3;
    string filename = 4;
    string filepath = 5;
    int32 creatorId = 6;
}

message VideoResponse {
    int32 id = 1;
    string title = 2;
    string description = 3;
    string category = 4;
    string filename = 5;
    string filepath = 6;
    int32 creatorId = 7;
    int32 views = 8;
    int32 likes = 9;
}

message VideoList {
    repeated VideoResponse videos = 1;
}

message DeleteResponse {
    bool success = 1;
    string message = 2;
}